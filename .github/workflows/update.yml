name: Update Helium Browser

on:
  schedule:
    - cron: '0 0,12 * * *'

  workflow_dispatch: 

jobs:
  update-flake:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main

      - name: Check for updates and patch flake
        id: update
        run: |
          LATEST_VERSION=$(curl -s https://api.github.com/repos/imputnet/helium-linux/releases/latest | jq -r '.tag_name')
          CURRENT_VERSION=$(grep -oP 'version = "\K[^"]+' flake.nix)
          
          if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ] && [ "$LATEST_VERSION" != "null" ]; then
            echo "Update found!"
            
            URL="https://github.com/imputnet/helium-linux/releases/download/${LATEST_VERSION}/helium-${LATEST_VERSION}-x86_64.AppImage"
            JSON=$(nix store prefetch-file --json "$URL")
            SRI_HASH=$(echo $JSON | jq -r '.hash')
            
            sed -i "s/version = \".*\"/version = \"$LATEST_VERSION\"/" flake.nix
            sed -i "s|hash = \".*\"|hash = \"$SRI_HASH\"|" flake.nix
            
            echo "{\"schemaVersion\": 1, \"label\": \"helium version\", \"message\": \"$LATEST_VERSION\", \"color\": \"blue\"}" > version.json
            
            echo "updated=true" >> $GITHUB_OUTPUT
            echo "new_version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          else
            echo "No update needed."
            echo "updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Verify GPG Signature
        if: steps.update.outputs.updated == 'true'
        run: |
          echo "importing Helium public GPG key"
          gpg --import .github/workflows/helium-pubkey.asc

          VERSION="${{ steps.update.outputs.new_version }}"
          FILE="helium-${VERSION}-x86_64.AppImage"

          echo "downloading AppImage and its signature file"
          curl -sL "https://github.com/imputnet/helium-linux/releases/download/${VERSION}/${FILE}" -o "$FILE"
          curl -sL "https://github.com/imputnet/helium-linux/releases/download/${VERSION}/${FILE}.asc" -o "${FILE}.asc"

          echo "Checking cryptographic signature..."
          if ! gpg --verify "${FILE}.asc" "$FILE"; then
            echo "ERROR: GPG signature verification failed!"
            exit 1
          fi
          echo "GPG signature verified successfully!"

      - name: Verify Build
        if: steps.update.outputs.updated == 'true'
        run: |
          echo "Testing build..."
          nix build .
          echo "Build successful!"
          
      - name: Commit and Push Changes
        if: steps.update.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add flake.nix version.json
          git commit -m "chore: update helium browser to ${{ steps.update.outputs.new_version }}"

          TAG="v${{ steps.update.outputs.new_version }}"
          git tag $TAG

          git push origin master --follow-tags
